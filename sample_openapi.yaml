openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0

paths:
  /users:
    get:
      summary: Get users
    post:
      summary: Create user
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"

  /users/{id}:
    delete:
      summary: Delete user

components:
  schemas:
    UserCreate:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        active:
          type: boolean
        tags:
          type: array
          items:
            type: string